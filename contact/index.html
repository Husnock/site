<!DOCTYPE html>
<html lang="nl">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- SEO & Zichtbaarheid -->
    <title>Contact | Tab Digital - Google Sheets & Automation Specialist</title>
    <meta name="description" content="Neem direct contact op met Tab Digital. Stuur ons een e-mail, start een WhatsApp-gesprek of connect via LinkedIn." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph Tags (LinkedIn & WhatsApp) -->
    <meta property="og:title" content="Contact | Tab Digital - Google Sheets & Automation Specialist" />
    <meta property="og:description" content="Stuur ons direct een bericht via e-mail of WhatsApp. We helpen je graag slimmer werken." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.tabdigital.nl/contact" />
    <meta property="og:image" content="https://raw.githubusercontent.com/Husnock/site/eacab826f55fbb980a22698a1fbbcf9d6073b294/assets/LOGO.png" />

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght=400;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Husnock/site/eacab826f55fbb980a22698a1fbbcf9d6073b294/assets/LOGO.png">

    <style>
      :root {
        --bg-dark: #0f172a;
        --bg-card: #1e293b;
        --bg-accent: #f97316;
        --text-light: #f1f5f9;
        --text-muted: #94a3b8;
        --border-color: #334155;
        --hover-bg: #273549;
        --whatsapp-green: #25d366;
        --linkedin-blue: #0a66c2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Open Sans", sans-serif;
        background: var(--bg-dark);
        color: var(--text-light);
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .wrap {
        flex: 1;
        max-width: 500px;
        margin: 40px auto;
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        width: 100%;
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 24px 24px;
        background: var(--bg-card);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        position: relative;
        text-align: center;
      }

      .back-link {
        position: absolute;
        top: 16px;
        left: 20px;
        font-size: 13px;
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
      }

      .back-link:hover {
        color: var(--bg-accent);
      }

      .logo-container {
        margin-top: 15px;
        margin-bottom: 12px;
        animation: fadeIn 1s ease;
      }

      .logo-container img {
        height: 70px;
        width: auto;
        border-radius: 12px;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      h1 {
        font-size: 24px;
        color: #fef3c7;
        margin-top: 0;
        margin-bottom: 10px;
      }

      p.muted {
        color: var(--text-muted);
        margin-bottom: 28px;
        font-size: 15px;
        line-height: 1.6;
      }

      /* Contactknoppen */
      .contact-options {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        color: #fff;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn-email {
        background: linear-gradient(135deg, #ea580c, var(--bg-accent));
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
      }
      .btn-email:hover {
        box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5);
      }

      .btn-whatsapp {
        background: #128c7e;
        box-shadow: 0 4px 15px rgba(18, 140, 126, 0.3);
      }
      .btn-whatsapp:hover {
        background: #149c8c;
        box-shadow: 0 6px 20px rgba(18, 140, 126, 0.5);
      }

      .btn-linkedin {
        background: #0077b5;
        box-shadow: 0 4px 15px rgba(0, 119, 181, 0.3);
      }
      .btn-linkedin:hover {
        background: #0087cb;
        box-shadow: 0 6px 20px rgba(0, 119, 181, 0.5);
      }

      /* SVG Iconen binnen de knoppen */
      .btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      .kvk-info {
        margin-top: 24px;
        font-size: 12px;
        color: var(--text-muted);
        border-top: 1px solid var(--border-color);
        padding-top: 16px;
      }

      footer {
        background: #111;
        color: #999;
        text-align: center;
        padding: 20px 0;
        font-size: 13px;
        margin-top: auto;
        border-top: 1px solid #1e293b;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <a class="back-link" href="https://www.tabdigital.nl/">← Terug</a>

        <div class="logo-container">
          <img src="https://raw.githubusercontent.com/Husnock/site/eacab826f55fbb980a22698a1fbbcf9d6073b294/assets/LOGO.png" alt="Tab Digital Logo" />
        </div>

        <h1>Laten we kennismaken</h1>
          <div class="contact-options">
          <!-- E-mail Knop -->
          <a href="mailto:stijn@tabdigital.nl?subject=Aanvraag%20via%20website%20-%20Tab%20Digital" class="btn btn-email">
            <!-- Mail Icon -->
            <svg viewBox="0 0 24 24">
              <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            Stuur een e-mail
          </a>

          <!-- LinkedIn Knop -->
          <a href="https://www.linkedin.com/in/stijn-tab-digital" target="_blank" class="btn btn-linkedin">
            <!-- LinkedIn Icon -->
            <svg viewBox="0 0 24 24">
              <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
            Connect op LinkedIn
          </a>
        </div>

        <div class="kvk-info">
          <strong>Tab Digital</strong><br />
          Kamer van Koophandel: 99445476
        </div>
      </div>
    </div>

    <footer></footer>

    <script>
      // Dynamische footerdatum
      const year = new Date().getFullYear();
      const footer = document.querySelector('footer');
      if (footer) {
        footer.innerHTML = `
          &copy; ${year} Tab Digital ·
          KvK: 99445476 ·
          Email:<a href="mailto:stijn@tabdigital.nl">stijn@tabdigital.nl</a>
        `;
      }
    </script>
  </body>
</html>
