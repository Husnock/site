<!DOCTYPE html>
<html lang="nl">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- SEO & Zichtbaarheid -->
    <title>Contact | Tab Digital - Google Sheets & Automation Specialist</title>
    <meta name="description" content="Neem direct contact op met Tab Digital. Stuur ons een e-mail, start een WhatsApp-gesprek of connect via LinkedIn." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph Tags (LinkedIn & WhatsApp) -->
    <meta property="og:title" content="Contact | Tab Digital - Google Sheets & Automation Specialist" />
    <meta property="og:description" content="Stuur ons direct een bericht via e-mail of WhatsApp. We helpen je graag slimmer werken." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.tabdigital.nl/contact" />
    <meta property="og:image" content="https://raw.githubusercontent.com/Husnock/site/eacab826f55fbb980a22698a1fbbcf9d6073b294/assets/LOGO.png" />

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght=400;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Husnock/site/eacab826f55fbb980a22698a1fbbcf9d6073b294/assets/LOGO.png">

    <style>
      :root {
        --bg-dark: #0f172a;
        --bg-card: #1e293b;
        --bg-accent: #f97316;
        --text-light: #f1f5f9;
        --text-muted: #94a3b8;
        --border-color: #334155;
        --hover-bg: #273549;
        --whatsapp-green: #25d366;
        --linkedin-blue: #0a66c2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Open Sans", sans-serif;
        background: var(--bg-dark);
        color: var(--text-light);
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .wrap {
        flex: 1;
        max-width: 500px;
        margin: 40px auto;
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        width: 100%;
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 24px 24px;
        background: var(--bg-card);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        position: relative;
        text-align: center;
      }

      .back-link {
        position: absolute;
        top: 16px;
        left: 20px;
        font-size: 13px;
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
      }

      .back-link:hover {
        color: var(--bg-accent);
      }

      .logo-container {
        margin-top: 15px;
        margin-bottom: 12px;
        animation: fadeIn 1s ease;
      }

      .logo-container img {
        height: 70px;
        width: auto;
        border-radius: 12px;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      h1 {
        font-size: 24px;
        color: #fef3c7;
        margin-top: 0;
        margin-bottom: 10px;
      }

      p.muted {
        color: var(--text-muted);
        margin-bottom: 28px;
        font-size: 15px;
        line-height: 1.6;
      }

      /* Contactknoppen */
      .contact-options {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        color: #fff;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn-email {
        background: linear-gradient(135deg, #ea580c, var(--bg-accent));
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
      }
      .btn-email:hover {
        box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5);
      }

      .btn-whatsapp {
        background: #128c7e;
        box-shadow: 0 4px 15px rgba(18, 140, 126, 0.3);
      }
      .btn-whatsapp:hover {
        background: #149c8c;
        box-shadow: 0 6px 20px rgba(18, 140, 126, 0.5);
      }

      .btn-linkedin {
        background: #0077b5;
        box-shadow: 0 4px 15px rgba(0, 119, 181, 0.3);
      }
      .btn-linkedin:hover {
        background: #0087cb;
        box-shadow: 0 6px 20px rgba(0, 119, 181, 0.5);
      }

      /* SVG Iconen binnen de knoppen */
      .btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      .kvk-info {
        margin-top: 24px;
        font-size: 12px;
        color: var(--text-muted);
        border-top: 1px solid var(--border-color);
        padding-top: 16px;
      }

      footer {
        background: #111;
        color: #999;
        text-align: center;
        padding: 20px 0;
        font-size: 13px;
        margin-top: auto;
        border-top: 1px solid #1e293b;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <a class="back-link" href="https://www.tabdigital.nl/">← Terug</a>

        <div class="logo-container">
          <img src="https://raw.githubusercontent.com/Husnock/site/eacab826f55fbb980a22698a1fbbcf9d6073b294/assets/LOGO.png" alt="Tab Digital Logo" />
        </div>

        <h1>Laten we kennismaken</h1>
        <p class="muted">
          Geen gedoe met formulieren die niet aankomen. Kies simpelweg je favoriete manier om direct met ons te schakelen.
        </p>

        <div class="contact-options">
          <!-- E-mail Knop -->
          <a href="mailto:stijn@tabdigital.nl?subject=Aanvraag%20via%20website%20-%20Tab%20Digital" class="btn btn-email">
            <!-- Mail Icon -->
            <svg viewBox="0 0 24 24">
              <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            Stuur een e-mail
          </a>

          <!-- WhatsApp Knop -->
          <!-- Tip: vervang het nummer hieronder eventueel door je eigen mobiele nummer indien gewenst -->
          <a href="https://wa.me/31612345678?text=Hallo%20Stijn,%20ik%20heb%20een%20vraag%20over%20Google%20Sheets/automatisering." target="_blank" class="btn btn-whatsapp">
            <!-- WhatsApp Icon -->
            <svg viewBox="0 0 24 24">
              <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.717-1.456L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.742.002-2.602-1.01-5.05-2.85-6.892-1.84-1.841-4.29-2.853-6.892-2.855-5.438 0-9.863 4.372-9.867 9.743-.001 1.764.475 3.488 1.38 5.013l-.973 3.559 3.657-.938zm11.367-7.795c-.3-.15-1.77-.875-2.043-.974-.275-.1-.475-.15-.675.15-.2.3-.775.974-.95 1.174-.175.2-.35.225-.65.075-.3-.15-1.263-.465-2.403-1.485-.888-.795-1.484-1.77-1.66-2.07-.175-.3-.02-.46.13-.61.135-.135.3-.35.45-.525.15-.175.2-.3.3-.5s.05-.375-.025-.525C10.1 7.2 9.5 5.725 9.25 5.125c-.244-.595-.49-.515-.675-.525-.175-.007-.375-.01-.575-.01-.2 0-.525.075-.8 1.05-.275.975-1.05 2.55-1.125 2.7-.075.15-.15.325-.025.575.125.25.55.905 1.175 1.45 1.11 1.035 2.05 1.013 2.513.975.463-.038 1.455-.595 1.66-1.17.205-.575.205-1.07.142-1.17-.062-.1-.235-.15-.535-.3z"/>
            </svg>
            Stuur een WhatsApp
          </a>

          <!-- LinkedIn Knop -->
          <a href="https://www.linkedin.com/in/stijn-tab-digital" target="_blank" class="btn btn-linkedin">
            <!-- LinkedIn Icon -->
            <svg viewBox="0 0 24 24">
              <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
            Connect op LinkedIn
          </a>
        </div>

        <div class="kvk-info">
          <strong>Tab Digital</strong><br />
          Kamer van Koophandel: 99445476
        </div>
      </div>
    </div>

    <footer></footer>

    <script>
      // Dynamische footerdatum
      const year = new Date().getFullYear();
      const footer = document.querySelector('footer');
      if (footer) {
        footer.innerHTML = `
          &copy; ${year} Tab Digital ·
          KvK: 99445476 ·
          Email:<a href="mailto:stijn@tabdigital.nl">stijn@tabdigital.nl</a>
        `;
      }
    </script>
  </body>
</html>
